<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{site_title}}</title>
    
    <meta name="description" content="{{seo_description}}">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }   
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-slate-900 antialiased">
    <div class="fixed top-6 inset-x-0 z-50 px-6">
  <header class="max-w-5xl mx-auto rounded-2xl border border-[var(--border)] shadow-lg backdrop-blur-md flex justify-between items-center px-6 py-3" style="background-color: rgba(var(--bg-paper-rgb, 255, 255, 255), 0.8);">
    <div class="flex items-center space-x-2">
      <div class="w-6 h-6 rounded-md" style="background-color: var(--primary);"></div>
      <span class="font-bold text-lg" style="color: var(--text-main);">{{logo_text}}</span>
    </div>
    
    <nav class="hidden md:flex space-x-6 text-sm font-medium">
      <a href="#" style="color: var(--text-muted);" class="hover:text-[var(--primary)] transition">Ecosystem</a>
      <a href="#" style="color: var(--text-muted);" class="hover:text-[var(--primary)] transition">Docs</a>
    </nav>

    <button class="btn-primary px-5 py-2 text-sm">Launch App</button>
  </header>
</div>

    <main>
        <section class="relative w-full py-24 overflow-hidden" style="background-color: var(--bg-dark);">
  <div class="absolute top-0 left-1/4 w-96 h-96 rounded-full blur-[120px] opacity-20" style="background-color: var(--primary);"></div>
  
  <div class="relative max-w-7xl mx-auto px-6 text-center lg:text-left flex flex-col lg:flex-row items-center justify-between">
    <div class="lg:w-1/2 space-y-6">
      <h2 class="text-4xl lg:text-5xl font-bold leading-tight text-white">
        {{hero_title}}
      </h2>
      <p class="text-lg opacity-70 text-white">
        {{hero_description}}
      </p>
      <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4 justify-center lg:justify-start">
        <button class="btn-primary border-none shadow-lg shadow-[var(--primary)]/30">預約 Demo</button>
        <button class="px-6 py-3 border border-white/20 rounded-[var(--radius)] text-white hover:bg-white/10 transition">技術文件</button>
      </div>
    </div>
    <div class="lg:w-1/3 mt-12 lg:mt-0 p-8 rounded-3xl border border-white/10 bg-white/5 backdrop-blur-sm">
        <div class="space-y-4">
            <div class="h-2 w-1/2 bg-white/20 rounded"></div>
            <div class="h-2 w-full bg-white/10 rounded"></div>
            <div class="h-2 w-3/4 bg-white/10 rounded"></div>
            <div class="pt-4 flex justify-between">
                <div class="w-10 h-10 rounded-full bg-[var(--primary)]"></div>
                <div class="w-24 h-10 rounded-lg bg-white/20"></div>
            </div>
        </div>
    </div>
  </div>
</section>
    
        <section id="features" class="feature py-20 bg-slate-100">

<div class="max-w-6xl mx-auto">

<h2 class="text-3xl font-bold text-center mb-10">

{{features_title}}2

</h2>

<div class="grid md:grid-cols-3 gap-8">

<div>
<h3>{{feature1_title}}2</h3>
<p>{{feature1_desc}}2</p>
</div>

<div>
<h3>{{feature2_title}}2</h3>
<p>{{feature2_desc}}2</p>
</div>

<div>
<h3>{{feature3_title}}2</h3>
<p>{{feature3_desc}}2</p>
</div>

</div>

</div>

</section>
    
        <section id="about" class="about py-20">

<div class="max-w-4xl mx-auto text-center">

<h2 class="text-3xl font-bold mb-6">

關於我們

</h2>

<p>

{{about_text}}

</p>

</div>

</section>
    
        <section id="contact" class="contact py-20 bg-slate-100 text-center">

<h2 class="text-3xl font-bold mb-6">

聯絡我們

</h2>

<p>

Email: {{contact_email}}

</p>

</section>
    </main>

    <footer class="footer border-t py-10 text-center text-sm text-slate-500">

© <span data-year></span> {{site_title}}

</footer>
    
    <script src="script.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => {

const year = new Date().getFullYear()
console.log(year)

document.querySelectorAll("[data-year]").forEach(el=>{
el.textContent = year
})

const btn = document.getElementById("menu-btn")
const menu = document.getElementById("menu")

if(btn && menu){

btn.addEventListener("click",()=>{
menu.classList.toggle("hidden")
})

}

})
</script></body>
</html>
